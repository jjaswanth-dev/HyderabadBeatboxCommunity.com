<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="160" height="160" rx="40" fill="#18181B"/>
  <g filter="url(#glow)">
    <ellipse cx="80" cy="120" rx="48" ry="12" fill="#00E0FF" fill-opacity="0.18"/>
  </g>
  <g>
    <!-- Beatbox mic -->
    <rect x="70" y="44" width="20" height="44" rx="10" fill="#23272F" stroke="#00E0FF" stroke-width="2"/>
    <ellipse cx="80" cy="44" rx="10" ry="10" fill="#00E0FF" fill-opacity="0.7"/>
    <rect x="75" y="88" width="10" height="24" rx="5" fill="#23272F" stroke="#00E0FF" stroke-width="2"/>
    <rect x="77" y="112" width="6" height="10" rx="3" fill="#00E0FF" fill-opacity="0.7"/>
    <!-- Sound waves -->
    <path d="M60 60 Q50 80 60 100" stroke="#00E0FF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M100 60 Q110 80 100 100" stroke="#00E0FF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M52 70 Q40 80 52 90" stroke="#00E0FF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M108 70 Q120 80 108 90" stroke="#00E0FF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <g>
    <!-- Sad face for no events -->
    <ellipse cx="80" cy="135" rx="12" ry="4" fill="#00E0FF" fill-opacity="0.2"/>
    <path d="M72 132 Q80 138 88 132" stroke="#00E0FF" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <defs>
    <filter id="glow" x="20" y="108" width="120" height="32" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
